.btn{display:inline-flex;align-items:center;gap:8px;border:none;cursor:pointer;font-family:var(--body);font-weight:600;
  font-size:14.5px;padding:13px 22px;border-radius:999px;transition:transform .18s,box-shadow .18s,background .18s,border-color .18s}
.btn:active{transform:translateY(1px)}
.btn.primary{background:linear-gradient(135deg,var(--gold),var(--gold-2));color:#241704;box-shadow:0 10px 28px -8px rgba(200,169,106,.5)}

.btn.ghost{background:var(--panel);border:1px solid var(--line);color:var(--text)}

.btn.gold{background:var(--gold);color:#3a2c08}

.brand{display:flex;align-items:center;gap:14px;margin-bottom:24px}
.brand .mark{width:48px;height:48px;flex-shrink:0;border-radius:12px;object-fit:cover;box-shadow:var(--shadow);display:block}
.intro-logo{width:74px;height:74px;border-radius:18px;display:block;margin-bottom:18px;box-shadow:var(--shadow)}
.login-logo{width:56px;height:56px;border-radius:15px;display:block;margin-bottom:14px}
.brand .wordmark h1{font-family:var(--disp);font-size:23px;font-weight:600;letter-spacing:.14em;line-height:1;color:var(--text)}
.brand .wordmark p{font-family:var(--body);font-size:9px;font-weight:600;letter-spacing:.4em;text-transform:uppercase;color:var(--gold);margin-top:5px}
.brand .admin-link{margin-left:auto;font-size:13px;color:var(--muted);background:none;border:none;cursor:pointer;display:inline-flex;gap:6px;align-items:center}

.progress-shell{position:sticky;top:0;z-index:30;padding:14px 0 10px;backdrop-filter:blur(8px);

.steps{display:flex;gap:6px;margin-bottom:8px}

.steps .seg.done i,.steps .seg.active i{width:100%}
.pmeta{display:flex;justify-content:space-between;font-size:12.5px;color:var(--muted);font-weight:600;font-family:var(--mono)}
.panel{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);
  padding:34px 34px 30px;display:none;backdrop-filter:blur(14px)}
.panel.show{display:block;animation:slideUp .55s cubic-bezier(.16,.84,.44,1)}
@keyframes slideUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:none}}
.eyebrow{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:700;text-transform:uppercase;

.panel h2{font-size:26px;font-weight:600;margin-bottom:8px;line-height:1.18}
.panel .sub{color:var(--muted);font-size:15px;margin-bottom:26px;max-width:62ch}
.hero h2{font-size:clamp(28px,4.5vw,36px);line-height:1.12;margin-bottom:14px}

.feat .f i{font-size:26px;color:var(--teal)}
.feat .f h4{font-size:15px;font-weight:700;margin:10px 0 4px}

.notice{display:flex;gap:12px;align-items:flex-start;border:1px solid rgba(200,169,106,.35);background:rgba(200,169,106,.08);

.notice i{font-size:21px;color:var(--gold);flex-shrink:0;margin-top:1px}
.tagline{font-family:var(--disp);font-style:italic;font-size:18px;color:var(--gold);margin:-2px 0 16px;line-height:1.3}
.pillars{display:flex;flex-wrap:wrap;gap:10px;margin:24px 0 6px}
.pillars .pill{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;color:var(--muted);background:var(--panel);border:1px solid var(--line);padding:8px 14px;border-radius:99px}

.nav{display:flex;justify-content:space-between;gap:12px;margin-top:30px}
.field{margin-bottom:24px;animation:fadeIn .5s backwards}

.qtext{font-size:16px;font-weight:600;margin:2px 0 13px;line-height:1.45}

.opts{display:grid;gap:9px}
.opts.cols{grid-template-columns:repeat(2,1fr)}

.opt-btn:hover{border-color:var(--violet);background:var(--panel-2)}

.opt-btn.sel .tick i{opacity:1}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
label.lbl{font-size:13px;color:var(--muted);font-weight:600;display:block;margin-bottom:6px}
input.txt{width:100%;border:1.5px solid var(--line);border-radius:11px;padding:12px 14px;font-family:inherit;

select.txt:focus{outline:none;border-color:var(--violet);box-shadow:0 0 0 4px rgba(200,169,106,.18)}
select.txt option{background:#16213A;color:var(--text)}
.field.invalid .errmsg{display:block}
.errmsg{display:none;color:var(--danger);font-size:13px;margin-top:8px}
.slider-item{display:grid;grid-template-columns:150px 1fr 92px;gap:14px;align-items:center;padding:7px 0}
.slider-item .sname{font-size:14.5px;font-weight:500}
.slider-item input[type=range]{-webkit-appearance:none;appearance:none;height:6px;border-radius:99px;

.slider-item input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;

.slider-item input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:#fff;border:3px solid var(--gold);cursor:pointer}
.slider-item .sval{font-family:var(--mono);font-size:12.5px;color:var(--muted);text-align:right}
.ssel{position:relative}
.ssel .ssel-list{position:absolute;top:calc(100% + 6px);left:0;right:0;max-height:240px;overflow:auto;background:#16213A;
  border:1px solid var(--line-2);border-radius:11px;z-index:20;display:none;box-shadow:var(--shadow)}
.ssel.open .ssel-list{display:block}
.ssel-list .it{padding:11px 15px;font-size:14.5px;cursor:pointer}
.ssel-list .it:hover{background:var(--panel-2)}
.ssel-list .empty{padding:13px 15px;color:var(--dim);font-size:14px}
.scorecard{display:flex;gap:24px;align-items:center;border:1px solid var(--line);border-radius:16px;padding:24px;
  background:linear-gradient(135deg,rgba(200,169,106,.10),rgba(200,169,106,.06));margin-bottom:24px}
.scorecard .big{font-family:var(--disp);font-size:62px;font-weight:700;line-height:1;color:var(--gold)}
.scorecard .big small{font-size:24px;color:var(--muted)}
.scorecard .lbl-k{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
.scorecard .desc{font-size:14.5px;color:var(--muted);margin-top:6px;max-width:46ch}
.sec{font-size:19px;font-weight:600;margin:30px 0 16px;display:flex;align-items:center;gap:10px}
.sec .ic{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;background:var(--panel);color:var(--gold);font-size:17px}
.dim{display:flex;gap:14px;align-items:flex-start;border:1px solid var(--line);border-radius:14px;padding:16px 18px;background:var(--panel);margin-bottom:11px;animation:fadeIn .5s backwards}
.dim .mono-ic{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;font-size:18px;flex-shrink:0;font-family:var(--disp);font-weight:700;color:#0F172A}
.dim .body{flex:1;min-width:0}
.dim .body .top{display:flex;justify-content:space-between;align-items:baseline;gap:12px;margin-bottom:8px}
.dim .body h4{font-size:15.5px;font-weight:700}
.dim .body .runi{font-size:12.5px;color:var(--gold);font-weight:600}
.dim .body .score{font-size:15px;font-weight:700;color:var(--gold);font-family:var(--disp)}
.bar{height:9px;border-radius:99px;background:var(--panel-2);overflow:hidden}
.bar i{display:block;height:100%;width:0;border-radius:99px;background:linear-gradient(90deg,var(--gold),var(--teal));transition:width 1.1s cubic-bezier(.2,.8,.2,1)}
.dim .note{font-size:13px;color:var(--muted);margin-top:8px}
.dim .meta{display:flex;flex-wrap:wrap;gap:7px;margin-top:9px}
.dim .meta span{font-size:11px;font-family:var(--mono);color:var(--dim);padding:4px 9px;border-radius:7px;background:var(--panel-2);display:inline-flex;gap:5px;align-items:center}
.unirow{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:13px}
.unitile{border:1px solid var(--line);border-radius:14px;padding:18px;text-align:center;background:var(--panel)}
.unitile .mono-ic{width:50px;height:50px;border-radius:13px;margin:0 auto 11px;display:grid;place-items:center;font-size:18px;font-family:var(--disp);font-weight:700;color:#0F172A}
.unitile b{font-size:14px} .unitile .c{font-family:var(--disp);font-size:30px;color:var(--gold);margin-top:6px}
.unitile small{color:var(--muted)}
.recos{display:grid;gap:10px}
.reco{display:flex;gap:12px;align-items:flex-start;border-left:4px solid var(--teal);background:rgba(157,181,164,.08);
  border-radius:0 12px 12px 0;padding:13px 16px;animation:fadeIn .5s backwards}
.reco.risk{border-left-color:var(--amber);background:rgba(200,169,106,.09)}
.reco i{font-size:20px;margin-top:1px;color:var(--teal)} .reco.risk i{color:var(--amber)}
.reco b{font-size:14.5px;font-weight:700;display:block} .reco p{font-size:13px;color:var(--muted)}
.chips{display:flex;flex-wrap:wrap;gap:9px}
.chip{padding:10px 15px;border-radius:99px;border:1px solid rgba(157,181,164,.35);background:rgba(157,181,164,.10);font-size:13.5px}
.roadmap{margin:6px 0 4px}
.phase{display:flex;gap:16px;position:relative;padding-bottom:22px;animation:fadeIn .5s backwards}
.phase:not(:last-child)::before{content:"";position:absolute;left:19px;top:42px;bottom:0;width:2px;background:var(--line)}
.phase .dot{width:40px;height:40px;border-radius:50%;flex-shrink:0;display:grid;place-items:center;color:#0F172A;
  font-weight:800;font-size:15px;background:linear-gradient(135deg,var(--gold),var(--violet));z-index:1;font-family:var(--disp)}
.phase .pc{flex:1;border:1px solid var(--line);border-radius:13px;padding:14px 17px;background:var(--panel)}
.phase .pc h4{font-size:15.5px;font-weight:700;margin-bottom:3px}
.phase .pc .dur{font-size:12px;color:var(--gold);font-weight:700;font-family:var(--mono)}
.phase .pc p{font-size:13.5px;color:var(--muted);margin-top:5px}
.cta{background:linear-gradient(120deg,var(--bg2),#1C2740);border:1px solid var(--line);border-radius:16px;padding:28px 30px;margin-top:24px}
.cta h3{font-size:21px;font-weight:700;margin-bottom:6px} .cta p{font-size:14.5px;color:var(--muted);margin-bottom:18px}
.cta .row{display:flex;gap:12px;flex-wrap:wrap}
.foot{text-align:center;color:var(--dim);font-size:12px;margin-top:26px;line-height:1.6}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(120px);background:var(--teal);color:#0F172A;
  padding:13px 22px;border-radius:12px;font-size:14px;font-weight:700;box-shadow:var(--shadow);transition:.4s;z-index:99}
.toast.show{transform:translateX(-50%) translateY(0)}
.confetti{position:fixed;width:9px;height:9px;top:-20px;z-index:80;border-radius:2px;pointer-events:none}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:18px 0 20px}
.tab{padding:9px 16px;border-radius:99px;background:var(--panel);border:1px solid var(--line);font-size:13.5px;font-weight:600;cursor:pointer}
.tab.active{background:var(--text);color:#0F172A;border-color:transparent}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--line)}
th{font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}
td .x{color:var(--danger);cursor:pointer;font-weight:700} td .e{color:var(--violet);cursor:pointer;margin-right:12px}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:13px;margin-bottom:20px}
.kpi{padding:18px;border:1px solid var(--line);border-radius:14px;background:var(--panel)}
.kpi .k{font-family:var(--mono);font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
.kpi .v{font-family:var(--disp);font-size:32px;color:var(--gold);margin-top:6px}
.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:13px;margin:8px 0 14px}
.form-grid .f2{grid-column:1/3}
.form-grid label{font-size:12px;color:var(--muted);display:block;margin-bottom:5px}
.form-grid input,.form-grid select{width:100%;padding:10px 12px;border-radius:10px;background:var(--panel);border:1px solid var(--line);color:var(--text);font-family:var(--body);font-size:13.5px}
.tagpick{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.tagpick .tp{padding:6px 11px;border-radius:99px;background:var(--panel);border:1px solid var(--line);font-size:11.5px;cursor:pointer}
.tagpick .tp.on{background:var(--violet);border-color:transparent;color:#fff}
.wgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}
.wcell label{font-size:13px;display:block;margin-bottom:8px} .wcell input{width:100%}
.anbar{display:grid;grid-template-columns:180px 1fr 40px;gap:12px;align-items:center;margin-bottom:10px;font-size:13px}
.anbar .t{height:10px;border-radius:5px;background:var(--panel-2);overflow:hidden} .anbar .t i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--teal))}
.note-inline{font-size:12.5px;color:var(--dim);margin:12px 0}
.modal-mask{position:fixed;inset:0;background:rgba(8,5,20,.72);backdrop-filter:blur(4px);z-index:50;display:none;align-items:center;justify-content:center;padding:20px}
.modal-mask.show{display:flex}
.modal{max-width:400px;width:100%;padding:28px}

  .wrap{padding:20px 14px 60px}.panel{padding:24px 20px}.slider-item{grid-template-columns:1fr;gap:6px}.slider-item .sval{text-align:left}

// ---- tailored reasoning helpers (name the client's actual answers) ----
function humanList(a){a=a.filter(Boolean);if(!a.length)return '';if(a.length===1)return a[0];if(a.length===2)return a[0]+' and '+a[1];return a.slice(0,-1).join(', ')+' and '+a[a.length-1];}
function matchedInterests(c,p){return INTERESTS.filter((x,i)=>c.interests[i]&&p.interests.includes(x));}
function matchedGoals(c,p){return GOALS.filter((x,i)=>c.goals[i]&&p.goals.includes(x));}
function skillStrengths(c,p){return SKILLS.filter((x,i)=>c.skills[i]&&(p.skills[x]||0)>=4);}
function skillGaps(c,p){return SKILLS.filter((x,i)=>c.skills[i]&&(p.skills[x]||0)<=2);}
function goalVerb(g){const m={'Promotion':'win the promotion you’re aiming for','Better salary':'move into higher-earning roles','Career change':'pivot into a new field','Migration':'build globally portable credentials','Academic career':'progress toward an academic career','Entrepreneurship':'launch and grow your own venture','Leadership':'step into leadership','Research':'move into research'};return m[g]||g.toLowerCase();}
function reasonText(r,p){
  const c=r.c,parts=[];
  parts.push('Accepts your '+r.field+' background (entry: '+classNameFromRank(c.minClass)+' or above)');
  if(r.delivery===1)parts.push('runs in your preferred '+(p.mode||'').toLowerCase()+' mode');
  else if(r.delivery===0.5)parts.push('offers a study mode close to your preference');
  parts.push(r.budget===1?'sits within your '+(p.budget||'stated')+' budget':'sits a little above your stated budget');
  let s=cap(parts.join(', '))+'. ';
  const mi=matchedInterests(c,p),mg=matchedGoals(c,p),ss=skillStrengths(c,p);
  const bits=[];
  if(mi.length)bits.push('it’s built around your interest in '+humanList(mi));
  if(mg.length)bits.push('it helps you '+humanList(mg.map(goalVerb)));
  if(ss.length)bits.push('it draws on your strengths in '+humanList(ss));
  if(bits.length)s+=cap(bits.join('; '))+'.';
  else s+='A solid eligible option, though it doesn’t line up tightly with the interests and goals you selected.';
  return s;
}

// ---- fit-based recommendation algorithm ----
// Eligibility is a hard filter (degree field accepted + class rank met).
// Among eligible programmes, rank by how well they fit THIS client's picks:
//  - interest/goal fit = blend of recall (how much of what you chose it covers)
//    and precision (how focused it is on your picks) — this stops broad,
//    "accept-everything" programmes from winning on breadth alone.
//  - skill fit = how strong you rated the skills the programme actually needs.
//  - study mode, budget, university preference and experience are modifiers.
function scoreAll(p){
  const W=getWeights(),courses=getCourses();
  const field=DEGREE_FIELD[p.degree]||'Other / Open',fi=FIELDS.indexOf(field);
  const cr=(CLASSES.find(c=>c[0]===p.classification)||['',5])[1];
  const bb=(BUDGET.find(b=>b[0]===p.budget)||['',4])[1];
  const ey=(EXP.find(e=>e[0]===p.experience)||['',0])[1],hasExp=ey>0||p.management==='Yes';
  const Ui=p.interests||[],Ug=p.goals||[];
  const hasPref=p.prefUni&&p.prefUni!=='No Preference';
  const wsum=(W.interest+W.goal+W.skill+W.delivery+W.budget+W.uni+W.exp)||1;
  const fit=(matched,userN,progN)=>{ // recall/precision blend, 0..1
    if(!userN)return 0;const recall=matched/userN,prec=progN?matched/progN:0;
    return 0.65*recall+0.35*prec;
  };
  const res=courses.map(c=>{
    const eligible=(c.fields[fi]===1 && cr<=c.minClass)?1:0;
    const pInt=INTERESTS.filter((x,i)=>c.interests[i]);
    const pGoal=GOALS.filter((x,i)=>c.goals[i]);
    const miCount=Ui.filter(x=>pInt.includes(x)).length;
    const mgCount=Ug.filter(x=>pGoal.includes(x)).length;
    const interestScore=fit(miCount,Ui.length,pInt.length);
    const goalScore=fit(mgCount,Ug.length,pGoal.length);
    const reqSkills=SKILLS.filter((s,i)=>c.skills[i]);
    const skillScore=reqSkills.length?reqSkills.reduce((a,s)=>a+((p.skills[s]||0)/5),0)/reqSkills.length:0.5;
    const delivery=c.mode===p.mode?1:((c.mode==='Hybrid'||p.mode==='Hybrid')?0.5:0);
    const deliveryScore=c.mode===p.mode?1:((c.mode==='Hybrid'||p.mode==='Hybrid')?0.55:0.15);
    const budget=c.tuition<=bb?1:0,over=c.tuition-bb;
    const budgetScore=over<=0?1:(over===1?0.45:0.15);
    const uniScore=hasPref?(c.uni===p.prefUni?1:0):0.5;
    const expScore=(c.rewardsExp&&hasExp)?1:(c.rewardsExp?0.4:0.6);
    let blended=(W.interest*interestScore+W.goal*goalScore+W.skill*skillScore+W.delivery*deliveryScore+W.budget*budgetScore+W.uni*uniScore+W.exp*expScore)/wsum;
    // demote programmes that touch none of the client's chosen interests or goals
    if(miCount===0&&mgCount===0)blended*=0.55;
    else if(miCount===0)blended*=0.8;
    const score=eligible?Math.round(blended*100):0;
    return {c,eligible,field,delivery,budget,interest:miCount,goal:mgCount,interestScore,goalScore,skillScore,score};
  });
  const elig=res.filter(r=>r.eligible===1).sort((a,b)=>b.score-a.score||b.interest-a.interest||b.goal-a.goal||a.c.tuition-b.c.tuition);
  elig.forEach(r=>r.pct=Math.max(38,Math.min(99,r.score)));
  return {elig,field};
}

function stepPanel(s,i){let h='<div class="panel" data-p="'+i+'"><span class="eyebrow"><i class="ti '+STEP_ICON[i]+'"></i> '+s.cat+'</span><h2>'+s.title+'</h2><p class="sub">'+s.sub+'</p>';
 let order=0;s.fields.forEach(f=>{h+='<div class="field" id="field_'+f.k+'" style="animation-delay:'+(order*0.06).toFixed(2)+'s">'+fieldInner(f)+'<div class="errmsg">Please complete this to continue.</div></div>';order++;});
 h+='<div class="nav"><button class="btn ghost" onclick="go(\''+(i===0?'intro':i-1)+'\')"><i class="ti ti-arrow-left"></i> Back</button>'+
 '<button class="btn primary" onclick="next('+i+')">'+(i===STEPS.length-1?'See my results':'Continue')+' <i class="ti ti-arrow-right"></i></button></div></div>';return h;}
function fieldInner(f){const v=profile[f.k];
 if(f.t==='textgroup')return '<div class="grid2">'+f.items.map(it=>'<div><label class="lbl">'+it.label+'</label><input class="txt" type="'+(it.type||'text')+'" data-k="'+it.k+'" placeholder="'+(it.ph||'')+'" value="'+escAttr(profile[it.k]||'')+'"></div>').join('')+'</div>';
 if(f.t==='search')return '<label class="lbl">'+f.label+'</label><div class="ssel" id="ssel_'+f.k+'"><input class="txt" id="ssel_in_'+f.k+'" autocomplete="off" placeholder="Type to search…" value="'+escAttr(v)+'"><div class="ssel-list" id="ssel_list_'+f.k+'"></div></div>';
 if(f.t==='select'){const opts=selectOptions(f);return '<label class="lbl">'+f.label+'</label><select class="txt" id="sel_'+f.k+'" data-k="'+f.k+'"><option value="">Select…</option>'+opts.map(o=>'<option value="'+escAttr(o)+'"'+(v===o?' selected':'')+'>'+o+'</option>').join('')+'</select>';}
 if(f.t==='sliders')return '<div class="qtext">'+f.label+'</div>'+f.opts.map(o=>{const sv=profile.skills[o]||3;return '<div class="slider-item"><span class="sname">'+o+'</span><input type="range" min="1" max="5" step="1" value="'+sv+'" data-s="'+escAttr(o)+'" style="--p:'+((sv-1)/4*100)+'%"><span class="sval" data-for="'+escAttr(o)+'">'+sliderLabel(sv)+'</span></div>';}).join('');
 const isMulti=f.t==='multi';const radio=(f.t==='single'||f.t==='toggle')?'radio ':'';const cols=(f.t==='toggle'||(f.opts.length<=5&&f.t==='single'))?' cols':'';
 const q='<div class="qtext">'+(f.label||'Select')+(isMulti?' <span class="optnote">(choose all that apply)</span>':'')+'</div>';
 return q+'<div class="opts'+cols+'" data-k="'+f.k+'" data-type="'+(isMulti?'multi':'single')+'">'+
 f.opts.map(o=>{const sel=isMulti?v.includes(o):v===o;return '<div class="opt-btn '+radio+(sel?'sel':'')+'" data-v="'+escAttr(o)+'"><span class="tick"><i class="ti ti-check"></i></span><span>'+o+'</span></div>';}).join('')+'</div>';}
function buildSteps(){document.getElementById('steps').innerHTML=STEPS.map(()=>'<div class="seg"><i></i></div>').join('');}
function sliderLabel(v){return ['','Beginner','Basic','Competent','Strong','Expert'][v];}
function bindAll(){const host=document.getElementById('panels');
 host.addEventListener('click',e=>{const b=e.target.closest('.opt-btn');if(!b)return;const grp=b.closest('.opts');pick(grp.dataset.k,b.dataset.v,grp.dataset.type,grp,b);});
 host.addEventListener('input',e=>{const t=e.target;
  if(t.matches('input[data-k]')){profile[t.dataset.k]=t.value;clearErr(t.closest('.field'));saveProgress();}
  else if(t.matches('input[type=range][data-s]')){const sk=t.dataset.s,val=+t.value;profile.skills[sk]=val;t.style.setProperty('--p',((val-1)/4*100)+'%');const lab=t.parentNode.querySelector('[data-for="'+cssEsc(sk)+'"]');if(lab)lab.textContent=sliderLabel(val);saveProgress();}});
 host.addEventListener('change',e=>{const t=e.target;if(!t.matches('select[data-k]'))return;profile[t.dataset.k]=t.value;clearErr(t.closest('.field'));
  if(t.dataset.k==='country'){const ss=document.getElementById('sel_state');if(ss){profile.state='';ss.innerHTML='<option value="">Select…</option>'+statesFor(t.value).map(x=>'<option value="'+escAttr(x)+'">'+x+'</option>').join('');}}
  saveProgress();});
 STEPS.forEach(s=>s.fields.forEach(f=>{if(f.t==='search')bindSearch(f);}));}
function pick(key,val,type,grp,btn){if(type==='multi'){const i=profile[key].indexOf(val);if(i>=0)profile[key].splice(i,1);else profile[key].push(val);btn.classList.toggle('sel');}
 else{profile[key]=val;grp.querySelectorAll('.opt-btn').forEach(x=>x.classList.remove('sel'));btn.classList.add('sel');}clearErr(grp.closest('.field'));saveProgress();}
function bindSearch(f){const inp=document.getElementById('ssel_in_'+f.k),list=document.getElementById('ssel_list_'+f.k),box=document.getElementById('ssel_'+f.k);if(!inp)return;
 function draw(q){const ql=(q||'').toLowerCase();const items=f.opts.filter(o=>o.toLowerCase().includes(ql));list.innerHTML=items.length?items.map(o=>'<div class="it" data-v="'+escAttr(o)+'">'+o+'</div>').join(''):'<div class="empty">No match — choose “Other”.</div>';list.querySelectorAll('.it').forEach(it=>it.addEventListener('mousedown',e=>{e.preventDefault();profile[f.k]=it.dataset.v;inp.value=it.dataset.v;box.classList.remove('open');clearErr(box.closest('.field'));saveProgress();}));}
 inp.addEventListener('focus',()=>{box.classList.add('open');draw(inp.value);});
 inp.addEventListener('input',()=>{box.classList.add('open');profile[f.k]='';draw(inp.value);});
 document.addEventListener('click',e=>{if(!box.contains(e.target))box.classList.remove('open');});}
function clearErr(field){if(field)field.classList.remove('invalid');}
function showPanel(p){cur=p;document.querySelectorAll('.panel[data-p]').forEach(el=>el.classList.remove('show'));
 const el=document.querySelector('.panel[data-p="'+p+'"]');if(el){void el.offsetWidth;el.classList.add('show');}
 const shell=document.getElementById('progressShell');if(p==='intro'||p==='results'){shell.style.display='none';}else{shell.style.display='block';updateSteps(p);}window.scrollTo({top:0,behavior:'smooth'});}
function updateSteps(i){document.querySelectorAll('#steps .seg').forEach((s,k)=>{s.classList.toggle('done',k<i);s.classList.toggle('active',k===i);});document.getElementById('stepName').textContent=STEPS[i].cat;document.getElementById('stepCount').textContent='Step '+(i+1)+' of '+STEPS.length;}
function go(p){saveProgress();showPanel(p);}
function next(i){if(!validateStep(i)){const f=document.querySelector('.panel[data-p="'+i+'"] .field.invalid');if(f)f.scrollIntoView({behavior:'smooth',block:'center'});return;}saveProgress();if(i===STEPS.length-1)finish();else showPanel(i+1);}
function validateStep(i){let ok=true;STEPS[i].fields.forEach(f=>{
 if(f.t==='textgroup'){f.items.forEach(it=>{if(!it.req)return;let bad=!profile[it.k];if(it.type==='email'&&profile[it.k])bad=!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(profile[it.k]);if(bad){ok=false;markErr(f.k);}});return;}
 if(!f.req)return;const v=profile[f.k];const bad=(f.t==='multi')?(!v||!v.length):!v;if(bad){ok=false;markErr(f.k);}});return ok;}
function markErr(k){const el=document.getElementById('field_'+k);if(el)el.classList.add('invalid');}
function startAssessment(){profile=blankProfile();buildPanels();}
function enterAdmin(){document.getElementById('loginMask').classList.add('show');setTimeout(()=>document.getElementById('adminPass').focus(),50);}
function closeLogin(){document.getElementById('loginMask').classList.remove('show');document.getElementById('adminPass').value='';}
function checkAdmin(){if(document.getElementById('adminPass').value==='talore2026'){closeLogin();document.getElementById('mainWrap').style.display='none';document.getElementById('adminWrap').style.display='block';renderAdmin();window.scrollTo(0,0);}else{document.getElementById('adminPass').style.borderColor='var(--danger)';}}
function exitAdmin(){document.getElementById('adminWrap').style.display='none';document.getElementById('adminWrap').innerHTML='';document.getElementById('mainWrap').style.display='block';window.scrollTo(0,0);}

  document.getElementById('adminWrap').innerHTML=
   '<div class="brand"><img class="mark" src="'+LOGO_SRC+'" alt="Talore HR Solutions logo"><div class="wordmark"><h1>TALORE</h1><p>HR Solutions · Admin</p></div>'+
   '<button class="admin-link" onclick="exitAdmin()"><i class="ti ti-arrow-left"></i> Exit to site</button></div>'+

function setTab(t){adminTab=t;document.querySelectorAll('#adminWrap .tab').forEach(b=>b.classList.toggle('active',b.textContent.toLowerCase()===t));renderAdminBody();}
function saveProgress(){const idx=(cur==='intro'||cur==='results')?0:cur;localStorage.setItem(LS.progress,JSON.stringify({profile,stepIndex:idx}));}

let lastResults=null;
function finish(){const {elig,field}=scoreAll(profile);const top=elig.slice(0,3),overall=top.length?Math.round(top.reduce((s,r)=>s+r.pct,0)/top.length):0;
 addSub({date:new Date().toISOString(),name:profile.fullName,email:profile.email,degree:profile.degree,prefUni:profile.prefUni,top:top[0]?top[0].c.name+' — '+shortUni(top[0].c.uni):'No eligible match',overall});
 localStorage.removeItem(LS.progress);lastResults={elig,overall,field};renderResults(elig,overall,field);showPanel('results');sendToFormProvider(profile,elig,overall,field);if(elig.length){confetti();toast('Your roadmap is ready');}}

// Consolidate the whole assessment into a single readable message block so the
// submission looks like an ordinary contact form (name/email/subject/message)
// rather than a many-field automated payload.
function buildSubmissionText(p,elig,overall,field){
  const L=[];
  L.push('TALORE HR — POSTGRADUATE PATHWAY ASSESSMENT');L.push('');
  L.push('APPLICANT');
  L.push('Name: '+(p.fullName||'—'));
  L.push('Email: '+(p.email||'—'));
  L.push('Location: '+([p.state,p.country].filter(Boolean).join(', ')||'—'));
  L.push('Degree: '+(p.degree||'—')+' ('+(p.classification||'—')+')'+(p.gradYear?(', graduated '+p.gradYear):''));
  L.push('Field of study: '+field);
  L.push('Experience: '+(p.experience||'—')+'  |  Management experience: '+(p.management||'—'));
  L.push('');L.push('RESPONSES');
  L.push('Interests: '+((p.interests||[]).join(', ')||'—'));
  L.push('Career goals: '+((p.goals||[]).join(', ')||'—'));
  L.push('Skills (1–5): '+SKILLS.map(s=>s+' '+(p.skills[s]||0)).join(', '));
  L.push('Preferred mode: '+(p.mode||'—')+'  |  Budget: '+(p.budget||'—')+'  |  Preferred university: '+(p.prefUni||'—'));
  L.push('');L.push('RECOMMENDATION');
  if(!elig.length){L.push('No eligible programme matched this profile in the current catalogue.');}
  else{const top=elig[0];
    L.push('Profile compatibility: '+overall+'%');
    L.push('Primary: '+top.c.name+' — '+top.c.uni+' ('+top.pct+'%)');
    L.push('Why: '+reasonText(top,p));
    const alts=elig.slice(1,4);
    if(alts.length){L.push('Alternatives:');alts.forEach((a,i)=>L.push('  '+(i+2)+'. '+a.c.name+' — '+shortUni(a.c.uni)+' ('+a.pct+'%)'));}
    L.push('Eligible programmes considered: '+elig.length);}
  L.push('');L.push('Submitted '+new Date().toLocaleString()+' via Talore Pathway Advisor.');
  return L.join('\n');
}
async function sendToFormProvider(p,elig,overall,field){
  if(!WEB3FORMS_KEY)return;
  const payload={access_key:WEB3FORMS_KEY,from_name:'Talore Pathway Advisor',
    subject:'Talore Assessment: '+(p.fullName||'Applicant')+(elig&&elig[0]?(' — '+elig[0].c.name):''),
    name:p.fullName||'Applicant',email:p.email||'',message:buildSubmissionText(p,elig,overall,field)};
  try{
    const res=await fetch('https://api.web3forms.com/submit',{method:'POST',
      headers:{'Content-Type':'application/json',Accept:'application/json'},body:JSON.stringify(payload)});
    const data=await res.json().catch(()=>({}));
    if(data&&data.success){toast('Results sent to Talore HR');}
    else{console.warn('Web3Forms did not confirm success:',data);toast('Saved — could not reach form provider');}
  }catch(e){console.warn('Web3Forms send failed:',e);toast('Saved — offline, not sent');}
}
function renderResults(elig,overall,field){let h='<div class="panel" data-p="results">';
 if(!elig.length){h+='<span class="eyebrow"><i class="ti ti-alert-triangle"></i> No match yet</span><h2>No eligible programme found</h2><p class="sub">With a '+field+' background at '+(profile.classification||'your')+' level, none of the current programmes cleared the entry bar. Try widening your budget or study mode.</p><div class="nav" style="justify-content:flex-end"><button class="btn primary" onclick="startAssessment()">Retake assessment</button></div></div>';
  document.querySelector('.panel[data-p="results"]')?.remove();document.getElementById('panels').insertAdjacentHTML('beforeend',h);return;}
 const top=elig[0],list=elig.slice(0,6),alts=elig.slice(6,9);const uniGroups={};elig.forEach(r=>{(uniGroups[r.c.uni]=uniGroups[r.c.uni]||[]).push(r);});
 const careers=[...new Set(elig.slice(0,3).flatMap(r=>(r.c.outcomes||'').split(/,\s*/)).filter(Boolean))].slice(0,7);
 const gaps=skillGaps(top.c,profile);const strengths=skillStrengths(top.c,profile);const mi=matchedInterests(top.c,profile),mg=matchedGoals(top.c,profile);
 const fn=profile.fullName?firstName(profile.fullName):'Your';
 h+='<span class="eyebrow"><i class="ti ti-award"></i> Your results</span><h2>'+(fn==='Your'?'Your':fn+'’s')+' postgraduate roadmap</h2><p class="sub">Based on a '+field+' background and '+(profile.classification||'your degree')+'. '+elig.length+' eligible programmes found.</p>';
 h+='<div class="scorecard"><div><div class="big" id="bigScore">0<small>%</small></div><div class="lbl-k">Profile compatibility</div></div><div><h4 style="font-size:18px">Strong fit for '+top.c.name+'</h4><p class="desc">'+reasonText(top,profile)+'</p><div class="bar" style="margin-top:12px;max-width:320px"><i id="heroBar"></i></div></div></div>';
 h+='<div class="sec"><span class="ic"><i class="ti ti-list-numbers"></i></span>Top recommended programmes</div>';
 list.forEach((r,i)=>{const m=UNI_MONO[r.c.uni]||['★','var(--panel-2)'];h+='<div class="dim" style="animation-delay:'+(i*0.05).toFixed(2)+'s"><div class="mono-ic" style="background:'+m[1]+'">'+m[0]+'</div><div class="body"><div class="top"><div><h4>'+r.c.name+'</h4><div class="runi">'+r.c.uni+'</div></div><div class="score">'+r.pct+'%</div></div><div class="bar"><i data-w="'+r.pct+'%"></i></div><div class="note">'+reasonText(r,profile)+'</div><div class="meta"><span><i class="ti ti-device-laptop"></i> '+r.c.mode+'</span><span><i class="ti ti-cash"></i> '+TUITION_RANGE[r.c.tuition]+'</span><span><i class="ti ti-certificate"></i> '+classNameFromRank(r.c.minClass)+'+</span></div></div></div>';});
 h+='<div class="sec"><span class="ic"><i class="ti ti-building-bank"></i></span>Universities you’re eligible for</div><div class="unirow">';
 Object.keys(uniGroups).forEach(u=>{const m=UNI_MONO[u]||['★','var(--panel-2)'];const g=uniGroups[u];h+='<div class="unitile"><div class="mono-ic" style="background:'+m[1]+'">'+m[0]+'</div><b>'+shortUni(u)+'</b><div class="c">'+g.length+'</div><small>eligible programme'+(g.length>1?'s':'')+'</small></div>';});h+='</div>';
 h+='<div class="sec"><span class="ic"><i class="ti ti-checks"></i></span>Why this fits — and what to strengthen</div><div class="recos">';
 h+='<div class="reco"><i class="ti ti-circle-check"></i><div><b>Eligible at '+shortUni(top.c.uni)+'</b><p>Your '+field+' degree meets the '+classNameFromRank(top.c.minClass)+'-or-above entry requirement, and it runs '+top.c.mode.toLowerCase()+(top.delivery===1?' — exactly your preference':'')+'.</p></div></div>';
 if(mi.length)h+='<div class="reco"><i class="ti ti-heart"></i><div><b>Built around your interests</b><p>Directly covers your selected interest'+(mi.length>1?'s':'')+': <b>'+humanList(mi)+'</b>.</p></div></div>';
 if(mg.length)h+='<div class="reco"><i class="ti ti-target"></i><div><b>Aimed at your goals</b><p>Helps you '+humanList(mg.map(goalVerb))+'.</p></div></div>';
 if(strengths.length)h+='<div class="reco"><i class="ti ti-bolt"></i><div><b>Plays to your strengths</b><p>You already rate highly in '+humanList(strengths)+' — core to this programme.</p></div></div>';
 if(gaps.length)gaps.forEach(s=>{h+='<div class="reco risk"><i class="ti ti-arrow-up-right"></i><div><b>Worth strengthening: '+s+'</b><p>'+top.c.name+' leans on '+s+', which you rated lower — building it before you start will help.</p></div></div>';});
 if(!mi.length&&!mg.length&&!strengths.length&&!gaps.length)h+='<div class="reco"><i class="ti ti-stars"></i><div><b>A solid eligible option</b><p>You qualify comfortably; selecting more specific interests and goals would sharpen the match.</p></div></div>';
 h+='</div>';
 h+='<div class="sec"><span class="ic"><i class="ti ti-briefcase"></i></span>Career opportunities</div><div class="chips">'+(careers.length?careers.map(c=>'<span class="chip">'+c+'</span>').join(''):'<span class="chip">Add interests to surface pathways</span>')+'</div>';
 h+='<div class="sec"><span class="ic"><i class="ti ti-route"></i></span>Your career roadmap</div><div class="roadmap">'+roadmapHTML(top,field)+'</div>';
 if(alts.length){h+='<div class="sec"><span class="ic"><i class="ti ti-bulb"></i></span>Alternatives worth considering</div>';alts.forEach(r=>{const m=UNI_MONO[r.c.uni]||['★','var(--panel-2)'];h+='<div class="dim"><div class="mono-ic" style="background:'+m[1]+'">'+m[0]+'</div><div class="body"><div class="top"><div><h4>'+r.c.name+'</h4><div class="runi">'+r.c.uni+'</div></div><div class="score">'+r.pct+'%</div></div><div class="note">'+reasonText(r,profile)+'</div></div></div>';});}
 h+='<div class="cta"><h3>Ready to take the next step?</h3><p>Empowering people, enriching organizations, building futures. Download your personalised report or talk to a Talore advisor at <b style="color:var(--gold)">www.talorehr.com</b>.</p><div class="row"><button class="btn gold" onclick="downloadPDF()"><i class="ti ti-download"></i> Download my report</button><button class="btn outline" onclick="startAssessment()"><i class="ti ti-refresh"></i> Retake assessment</button></div></div>';
 h+='<p class="foot">Recommendations use a weighted model across eligibility, interests, goals, skills, study mode and budget. Programme data is an editable starter set — confirm current admission requirements and fees with each university.</p></div>';
 document.querySelector('.panel[data-p="results"]')?.remove();document.getElementById('panels').insertAdjacentHTML('beforeend',h);
 requestAnimationFrame(()=>{countUp('bigScore',overall);const hb=document.getElementById('heroBar');if(hb)setTimeout(()=>hb.style.width=top.pct+'%',150);setTimeout(()=>document.querySelectorAll('.panel[data-p="results"] .dim .bar i[data-w]').forEach(i=>i.style.width=i.dataset.w),200);});}
function countUp(id,target){const el=document.getElementById(id);if(!el)return;let c=0;const step=()=>{c+=Math.ceil((target-c)/8);if(c>=target)c=target;el.innerHTML=c+'<small>%</small>';if(c<target)requestAnimationFrame(step);};requestAnimationFrame(step);}
function roadmapHTML(top,field){const goal=profile.goals[0]||'';const careers=(top.c.outcomes||'').split(/,\s*/);
 const phases=[['Today',field+' graduate'+(profile.experience&&profile.experience!=='None'?' · '+profile.experience+' yrs experience':''),'Where you are now'],[top.c.name,'Study at '+shortUni(top.c.uni)+' · '+top.c.mode,'Recommended programme'],[careers[0]||'Applied role','Put new skills to work','1–2 years'],[careers[1]||careers[0]||'Senior role','Deepen specialism and impact','3–5 years'],[goalPhrase(goal),'Your long-term ambition','Long term']];
 return phases.map((p,i)=>'<div class="phase" style="animation-delay:'+(i*0.08).toFixed(2)+'s"><div class="dot">'+(i+1)+'</div><div class="pc"><div class="dur">'+escHtml(p[2])+'</div><h4>'+escHtml(p[0])+'</h4><p>'+escHtml(p[1])+'</p></div></div>').join('');}
function goalPhrase(g){const m={'Promotion':'Senior / leadership position','Better salary':'Higher-earning role','Career change':'Established in a new field','Migration':'Global career mobility','Academic career':'Research / academic post','Entrepreneurship':'Founder / business owner','Leadership':'Executive leadership','Research':'Specialist / R&D lead'};return m[g]||'Career growth';}
function confetti(){const colors=['#C8A96A','#9DB5A4','#9DB5A4','#E4CE9E'];for(let i=0;i<70;i++){const c=document.createElement('div');c.className='confetti';c.style.left=Math.random()*100+'vw';c.style.background=colors[i%colors.length];c.style.transform='rotate('+Math.random()*360+'deg)';document.body.appendChild(c);const dur=2200+Math.random()*1600;c.animate([{transform:'translateY(0) rotate(0)',opacity:1},{transform:'translateY(105vh) rotate('+(360+Math.random()*360)+'deg)',opacity:.9}],{duration:dur,easing:'cubic-bezier(.3,.6,.4,1)'});setTimeout(()=>c.remove(),dur);}}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(window._t);window._t=setTimeout(()=>t.classList.remove('show'),2200);}
function downloadPDF(){if(!lastResults||!window.jspdf){toast('Preparing…');return;}const {jsPDF}=window.jspdf;const doc=new jsPDF({unit:'pt',format:'a4'});const W=595;let y=56;const gold=[200,169,106],ink=[44,44,44],mut=[120,120,140];
 doc.setFillColor(15,23,42);doc.rect(0,0,W,90,'F');try{doc.addImage(LOGO_SRC,'PNG',W-92,20,50,50);}catch(e){}doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(20);doc.text('Talore HR Solutions',40,52);doc.setFontSize(11);doc.setTextColor(200,169,106);doc.text('Postgraduate Pathway Report',40,72);
 y=120;doc.setTextColor.apply(doc,ink);doc.setFont('helvetica','bold');doc.setFontSize(14);doc.text((profile.fullName||'Applicant')+' — '+(profile.email||''),40,y);y+=18;
 doc.setFont('helvetica','normal');doc.setFontSize(10);doc.setTextColor.apply(doc,mut);doc.text((profile.degree||'')+' · '+(profile.classification||'')+'  |  Compatibility: '+lastResults.overall+'%',40,y);y+=26;
 doc.setTextColor.apply(doc,gold);doc.setFont('helvetica','bold');doc.setFontSize(12);doc.text('Top recommended programmes',40,y);y+=8;doc.setDrawColor(230,230,238);doc.line(40,y,W-40,y);y+=18;
 lastResults.elig.slice(0,5).forEach((r,i)=>{doc.setTextColor.apply(doc,ink);doc.setFont('helvetica','bold');doc.setFontSize(11);doc.text((i+1)+'. '+r.c.name+'  ('+r.pct+'%)',40,y);y+=14;doc.setFont('helvetica','normal');doc.setFontSize(9.5);doc.setTextColor.apply(doc,mut);doc.text(shortUni(r.c.uni)+' · '+r.c.mode+' · '+TUITION_RANGE[r.c.tuition],52,y);y+=13;const wr=doc.splitTextToSize(reasonText(r,profile),W-100);doc.text(wr,52,y);y+=wr.length*12+10;});
 y+=6;doc.setTextColor.apply(doc,gold);doc.setFont('helvetica','bold');doc.setFontSize(12);doc.text('Career roadmap',40,y);y+=8;doc.line(40,y,W-40,y);y+=18;
 const goal=profile.goals[0]||'';const top=lastResults.elig[0];const careers=(top.c.outcomes||'').split(/,\s*/);
 [['Today',lastResults.field+' graduate'],['Study',top.c.name],['1–2 yrs',careers[0]||'Applied role'],['3–5 yrs',careers[1]||careers[0]||'Senior role'],['Long term',goalPhrase(goal)]].forEach(p=>{doc.setTextColor.apply(doc,ink);doc.setFont('helvetica','bold');doc.setFontSize(10);doc.text(p[0]+':',52,y);doc.setFont('helvetica','normal');doc.setTextColor.apply(doc,mut);doc.text(p[1],120,y);y+=15;});
 y+=14;doc.setFontSize(8);doc.setTextColor.apply(doc,mut);doc.text(doc.splitTextToSize('Recommendations are guidance only. Confirm current admission requirements and fees with each university before applying.',W-80),40,y);doc.save('Talore_Pathway_Report.pdf');toast('Report downloaded');}
